<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Contact - info - Paul Alessandrini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Contact de Paul Alessandrini, développeur web."
    />
    <meta name="author" content="Paul Alessandrini" />
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- FIXE A TOUTE LES PAGES -->
    <section class="fix-container">
      <div class="header-row">
        <!-- LOGO + TITRE -->
        <div class="header-home-link" id="header-home-link">
          <img
            src="/img/nav-icon/darkmode/cv-blanc.png"
            alt="Logo CV"
            class="cv-logo"
          />
          <div class="main-title-group">
            <span class="main-title main-title-paul">Paul</span>
            <span class="main-title main-title-alessandrini">Alessandrini</span>
          </div>
        </div>
        <!-- NAV -->
        <nav class="navbar">
          <label class="theme-switch" id="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider">
              <img
                src="/img/nav-icon/lightmode/sun.png"
                alt="Soleil"
                class="icon sun"
              />
              <img
                src="/img/nav-icon/darkmode/moon.png"
                alt="Lune"
                class="icon moon"
              />
            </span>
          </label>
        </nav>
      </div>
    </section>
    <!-- HTML CHANGEANT-->
    <section class="contact-bg-container">
      <div class="contact-main">
        <form
          class="contact-form"
          action="mailto:paul.alessandrini@email.com"
          method="POST"
          enctype="text/plain"
        >
          <h2>Contactez-moi</h2>
          <div class="form-group input-face">
            <label for="contact-name">Nom</label>
            <input
              type="text"
              id="contact-name"
              name="Nom"
              required
              autocomplete="name"
              placeholder="Votre nom"
            />
          </div>
          <div class="form-group input-contact">
            <label for="contact-email">Email</label>
            <input
              type="email"
              id="contact-email"
              name="Email"
              required
              autocomplete="email"
              placeholder="Votre email"
            />
          </div>
          <div class="form-group input-bulle">
            <label for="contact-message">Message</label>
            <textarea
              id="contact-message"
              name="Message"
              rows="5"
              required
              placeholder="Votre message"
            ></textarea>
          </div>
          <button type="submit" class="contact-submit-btn">Envoyer</button>
        </form>
      </div>
      <aside class="contact-side">
        <div class="contact-side-content">
          <div class="portrait-container">
            <img
              src="/img/contact/portrait.jpg"
              alt="Portrait de Paul Alessandrini"
              class="portrait-image"
            />
            <div class="contact-name">Paul Alessandrini</div>
          </div>
          <ul class="contact-details">
            <li class="contact-text">
              <img
                src="/img/contact/darkmode/calendrier-blanc.png"
                alt="Âge"
                class="contact-icon"
              />
              29 ans
            </li>
            <li class="contact-text">
              <img
                src="/img/contact/darkmode/ping-blanc.png"
                alt="Localisation"
                class="contact-icon zoom"
              />
              Marseille, France
            </li>
          </ul>
          <div class="contact-links">
            <img
              src="/img/nav-icon/darkmode/contact-blanc.png"
              alt="Email"
              class="contact-icon social-icon email-link"
              id="email-link"
            />
            <a
              href="https://linkedin.com/in/paul-a-268a55339"
              target="_blank"
              aria-label="LinkedIn"
            >
              <img
                src="/img/contact/darkmode/linkedin-blanc.png"
                alt="LinkedIn"
                class="contact-icon social-icon"
              />
            </a>
            <a
              href="https://github.com/Palalde"
              target="_blank"
              aria-label="GitHub"
            >
              <img
                src="/img/contact/darkmode/github-blanc.png"
                alt="GitHub"
                class="contact-icon social-icon"
              />
            </a>
          </div>
        </div>
      </aside>
    </section>
    <!-- Classic CV download overlay -->
    <div class="download-overlay" id="cv-download-overlay" aria-hidden="true">
      <div
        class="download-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="download-overlay-title"
      >
        <header class="download-overlay-header">
          <div class="download-overlay-texts">
            <h2 id="download-overlay-title" class="download-overlay-title">
              CV classique
            </h2>
            <p class="download-overlay-description">
              Accéder au CV, format PDF
            </p>
          </div>
          <button
            type="button"
            class="search-overlay-close download-overlay-close"
            title="Fermer"
            aria-label="Fermer"
          >
            ✕
          </button>
        </header>
        <div class="download-overlay-actions">
          <a
            href="cv-classique.pdf"
            target="_blank"
            rel="noopener noreferrer"
            class="download-overlay-button"
            data-download-primary
          >
            <svg
              class="download-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Télécharger le CV
          </a>
        </div>
      </div>
    </div>
    <!-- FIXE A TOUTE LES PAGES -->
    <script src="/js/main.js"></script>
    <script src="/js/utility/theme-toggle.js"></script>
    <script src="/js/utility/copy-email.js"></script>
    <script
      type="module"
      src="/js/color-theme/color-theme-generator.js"
    ></script>
  </body>
</html>
