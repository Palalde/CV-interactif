<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>CV Interactif - Paul Alessandrini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="CV interactif de Paul Alessandrini, développeur web."
    />
    <meta name="author" content="Paul Alessandrini" />
    <!-- CSS -->
    <link rel="stylesheet" href="../style/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- FIXE A TOUTE LES PAGES -->
    <section class="fix-container">
      <div class="header-row">
        <!-- LOGO + TITRE -->
        <div class="header-home-link" id="header-home-link">
          <img src="../img/LOGO/CvBlanc.png" alt="Logo CV" class="cv-logo" />
          <div class="main-title-group">
            <span class="main-title main-title-paul">Paul</span>
            <span class="main-title main-title-alessandrini">Alessandrini</span>
          </div>
        </div>
        <!-- NAV -->
        <nav class="navbar">
          <a
            href=""
            target=""
            class="contact-info-block"
            title="Contact / Info"
          >
            <img
              src="../img/LOGO/ContactBlanc.png"
              alt="Contact"
              class="nav-icon icon-contact blanc"
            />
            <img
              src="../img/LOGO/ContactNoir.png"
              alt="Contact"
              class="nav-icon icon-contact noir"
            />
          </a>
          <a
            href="CV_Classique.pdf"
            target="_blank"
            class="classic-cv-block"
            title="CV classique"
          >
            <img
              src="../img/LOGO/PdfBlanc.png"
              alt="CV PDF"
              class="nav-icon icon-pdf blanc"
            />
            <img
              src="../img/LOGO/PdfNoir.png"
              alt="CV PDF"
              class="nav-icon icon-pdf noir"
            />
          </a>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider">
              <img src="../img/LOGO/sun.png" alt="Soleil" class="icon sun" />
              <img src="../img/LOGO/moon.png" alt="Lune" class="icon moon" />
            </span>
          </label>
        </nav>
      </div>
      <!-- RANGE SLIDER -->
      <div class="range-slider-container">
        <input
          type="range"
          min="1"
          max="200"
          step="1"
          value="1"
          class="range-slider"
          id="myRange"
        />
        <div class="range-labels">
          <span>Etudes</span>
          <span>Trading</span>
          <span>Leclerc</span>
          <span>Code</span>
        </div>
      </div>
    </section>
    <!-- HTML CHANGEANT-->
    <section class="change-contenair square">
      <div class="change-test square"></div>
      <div class="competence-test square"></div>
    </section>
    <!-- FIXE A TOUTE LES PAGES -->
    <footer class="footer square">
      <p class="copyright">&copy; 2025 Paul Alessandrini.</p>
      <a class="mail" href="mailto:palessandrini13@gmail.com">Mail</a>
    </footer>
    <script src="../Javascript/Main.JS"></script>
  </body>
</html>
