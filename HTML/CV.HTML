<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>CV Interactif - Paul Alessandrini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style/style.css" />
    <meta
      name="description"
      content="CV interactif de Paul Alessandrini, développeur web."
    />
    <meta name="author" content="Paul Alessandrini" />
  </head>
  <body>
    <!-- FIXE A TOUTE LES PAGES -->
    <section class="fix-container">
      <!-- TITRE -->
      <h1 class="main-title square">CV</h1>
      <!-- NAV -->
      <nav class="navbar square">
        <button id="theme-toggle" aria-label="Changer le mode sombre/clair">
          🌙/☀️
        </button>
        <a href="" target="" class="contact-info"> Contact / Info </a>
        <a href="CV_Classique.pdf" target="_blank" class="classic-cv-link"
          >CV classique</a
        >
      </nav>
      <!-- RANGE SLIDER -->
      <div class="range-slider-container square">
        <input
          type="range"
          min="1"
          max="200"
          step="1"
          value="1"
          class="range-slider"
          id="myRange"
        />
        <div class="range-labels">
          <span>Etudes</span>
          <span>Trading</span>
          <span>Leclerc</span>
          <span>Code</span>
        </div>
        <div class="range-value" id="rangeValue">Valeur : Etudes</div>
      </div>
    </section>
    <!-- HTML CHANGEANT-->
    <section class="change-contenair square">
      <div class="change-test square"></div>
      <div class="competence-test square"></div>
    </section>
    <!-- FIXE A TOUTE LES PAGES -->
    <footer class="footer square">
      <p class="copyright">
        &copy; 2024 Paul Alessandrini. Tous droits réservés.
      </p>
      <a class="mail" href="mailto:palessandrini13@gmail.com">Mail</a>
    </footer>
  </body>
</html>
