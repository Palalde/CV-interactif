<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>CV Interactif - Paul Alessandrini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="CV interactif de Paul Alessandrini, développeur web."
    />
    <meta name="author" content="Paul Alessandrini" />
    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- FIXE A TOUTE LES PAGES -->
    <section class="fix-container">
      <div class="header-row">
        <!-- LOGO + TITRE -->
        <div class="header-home-link" id="header-home-link">
          <img
            src="/img/nav-icon/darkmode/cv-blanc.png"
            alt="Logo CV"
            class="cv-logo"
          />
          <div class="main-title-group">
            <span class="main-title main-title-paul">Paul</span>
            <span class="main-title main-title-alessandrini">Alessandrini</span>
          </div>
        </div>
        <!-- BARRE DE RECHERCHE -->
        <form
          class="header-search-bar"
          action="#"
          method="get"
          autocomplete="off"
        >
          <input
            type="text"
            class="search-input"
            placeholder="Recherchez dans les competences"
            name="q"
          />
          <button type="submit" class="search-btn" title="Rechercher">
            <img
              src="/img/nav-icon/darkmode/loupe-bleu.png"
              alt="Rechercher"
              class="search-icon"
            />
          </button>
        </form>
        <!-- NAV -->
        <nav class="navbar">
          <a href="" target="" class="nav-search-btn" title="Search bar">
            <img
              src="/img/nav-icon/darkmode/loupe-blanc.png"
              alt="Rechercher"
              class="nav-icon icon-loupe main"
            />
            <img
              src="/img/nav-icon/darkmode/loupe-bleu.png"
              alt="Rechercher"
              class="nav-icon icon-loupe second"
            />
          </a>
          <a
            href="/html/contact-info.html"
            target="_self"
            class="contact-info-block"
            title="Contact / Info"
          >
            <img
              src="/img/nav-icon/darkmode/contact-blanc.png"
              alt="Contact"
              class="nav-icon icon-contact main"
            />
            <img
              src="/img/nav-icon/darkmode/contact-bleu.png"
              alt="Contact"
              class="nav-icon icon-contact second"
            />
          </a>
          <a
            href="cv-classique.pdf"
            target="_blank"
            class="classic-cv-block"
            title="CV classique"
          >
            <img
              src="/img/nav-icon/darkmode/pdf-blanc.png"
              alt="CV PDF"
              class="nav-icon icon-pdf main"
            />
            <img
              src="/img/nav-icon/darkmode/pdf-bleu.png"
              alt="CV PDF"
              class="nav-icon icon-pdf second"
            />
          </a>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider">
              <img
                src="/img/nav-icon/lightmode/sun.png"
                alt="Soleil"
                class="icon sun"
              />
              <img
                src="/img/nav-icon/darkmode/moon.png"
                alt="Lune"
                class="icon moon"
              />
            </span>
          </label>
        </nav>
      </div>
    </section>
    <!-- HTML CHANGEANT-->
    <section class="contact-bg-container">
      <div class="contact-main">
        <form
          class="contact-form"
          action="mailto:paul.alessandrini@email.com"
          method="POST"
          enctype="text/plain"
        >
          <h2>Contactez-moi</h2>
          <div class="form-group input-face">
            <label for="contact-name">Nom</label>
            <input
              type="text"
              id="contact-name"
              name="Nom"
              required
              autocomplete="name"
              placeholder="Votre nom"
            />
          </div>
          <div class="form-group input-contact">
            <label for="contact-email">Email</label>
            <input
              type="email"
              id="contact-email"
              name="Email"
              required
              autocomplete="email"
              placeholder="Votre email"
            />
          </div>
          <div class="form-group input-bulle">
            <label for="contact-message">Message</label>
            <textarea
              id="contact-message"
              name="Message"
              rows="5"
              required
              placeholder="Votre message"
            ></textarea>
          </div>
          <button type="submit" class="contact-submit-btn">Envoyer</button>
        </form>
      </div>
      <aside class="contact-side">
        <div class="contact-side-content">
          <div class="portrait-container">
            <img
              src="/img/contact/portrait.jpg"
              alt="Portrait de Paul Alessandrini"
              class="portrait-image"
            />
            <div class="contact-name">Paul Alessandrini</div>
          </div>
          <ul class="contact-details">
            <li class="contact-text">
              <img
                src="/img/contact/darkmode/calendrier-blanc.png"
                alt="Âge"
                class="contact-icon"
              />
              29 ans
            </li>
            <li class="contact-text">
              <img
                src="/img/contact/darkmode/ping-blanc.png"
                alt="Localisation"
                class="contact-icon zoom"
              />
              Marseille, France
            </li>
          </ul>
          <div class="contact-links">
            <a
              href="https://linkedin.com/in/paul-a-268a55339"
              target="_blank"
              aria-label="LinkedIn"
            >
              <img
                src="/img/contact/darkmode/linkedin-blanc.png"
                alt="LinkedIn"
                class="contact-icon social-icon"
              />
            </a>
            <a
              href="https://github.com/Palalde"
              target="_blank"
              aria-label="GitHub"
            >
              <img
                src="/img/contact/darkmode/github-blanc.png"
                alt="GitHub"
                class="contact-icon social-icon"
              />
            </a>
          </div>
        </div>
      </aside>
    </section>
    <!-- FIXE A TOUTE LES PAGES -->
    <script src="/js/main.js"></script>
    <script src="/js/utility/theme-toggle.js"></script>
  </body>
</html>
