<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>CV Interactif - Paul Alessandrini</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="CV interactif de Paul Alessandrini, développeur web."
    />
    <meta name="author" content="Paul Alessandrini" />
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Inter:400,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- FIXE A TOUTE LES PAGES -->
    <section class="fix-container">
      <div class="header-row">
        <!-- LOGO + TITRE -->
        <div class="header-home-link" id="header-home-link">
          <img
            src="../img/nav-icon/darkmode/cv-blanc.png"
            alt="Logo CV"
            class="cv-logo"
          />
          <div class="main-title-group">
            <span class="main-title main-title-paul">Paul</span>
            <span class="main-title main-title-alessandrini">Alessandrini</span>
          </div>
        </div>
        <!-- BARRE DE RECHERCHE -->
        <form
          class="header-search-bar"
          action="#"
          method="get"
          autocomplete="off"
        >
          <input
            type="text"
            class="search-input"
            placeholder="Recherchez dans les competences"
            name="q"
          />
          <button type="submit" class="search-btn" title="Rechercher">
            <img
              src="../img/nav-icon/darkmode/loupe-bleu.png"
              alt="Rechercher"
              class="search-icon"
            />
          </button>
        </form>
        <!-- NAV -->
        <nav class="navbar">
          <a href="" target="" class="nav-search-btn" title="Search bar">
            <img
              src="../img/nav-icon/darkmode/loupe-blanc.png"
              alt="Rechercher"
              class="nav-icon icon-loupe main"
            />
            <img
              src="../img/nav-icon/darkmode/loupe-bleu.png"
              alt="Rechercher"
              class="nav-icon icon-loupe second"
            />
          </a>
          <a
            href="contact-info.html"
            target="_self"
            class="contact-info-block"
            title="Contact / Info"
          >
            <img
              src="../img/nav-icon/darkmode/contact-blanc.png"
              alt="Contact"
              class="nav-icon icon-contact main"
            />
            <img
              src="../img/nav-icon/darkmode/contact-bleu.png"
              alt="Contact"
              class="nav-icon icon-contact second"
            />
          </a>
          <a
            href="cv-classique.pdf"
            target="_blank"
            class="classic-cv-block"
            title="CV classique"
          >
            <img
              src="../img/nav-icon/darkmode/pdf-blanc.png"
              alt="CV PDF"
              class="nav-icon icon-pdf main"
            />
            <img
              src="../img/nav-icon/darkmode/pdf-bleu.png"
              alt="CV PDF"
              class="nav-icon icon-pdf second"
            />
          </a>
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" />
            <span class="slider">
              <img
                src="../img/nav-icon/lightmode/sun.png"
                alt="Soleil"
                class="icon sun"
              />
              <img
                src="../img/nav-icon/darkmode/moon.png"
                alt="Lune"
                class="icon moon"
              />
            </span>
          </label>
        </nav>
      </div>
      <!-- RANGE SLIDER -->
      <div class="range-slider-container">
        <input
          type="range"
          min="1"
          max="200"
          step="1"
          value="1"
          class="range-slider"
          id="myRange"
        />
      </div>
    </section>
    <!-- HTML CHANGEANT-->
    <section class="change-contenair square">
      <div class="change-test square"></div>
      <div class="competence-test square"></div>
    </section>
    <!-- FIXE A TOUTE LES PAGES -->
    <script src="../js/main.js"></script>
    <script src="../js/utility/theme-toggle.js"></script>
  </body>
</html>
